services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: autotable-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  tempo:
    image: grafana/tempo:2.6.1
    container_name: autotable-tempo
    restart: unless-stopped
    user: "0:0"
    command:
      - "-config.file=/etc/tempo.yml"
    ports:
      - "3200:3200"
    volumes:
      - ./tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/tmp/tempo

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.113.0
    container_name: autotable-otel-collector
    restart: unless-stopped
    command:
      - "--config=/etc/otel-collector.yml"
    depends_on:
      - tempo
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector.yml:/etc/otel-collector.yml:ro

  grafana:
    image: grafana/grafana:11.3.1
    container_name: autotable-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - tempo
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  prometheus-data:
  grafana-data:
  tempo-data:
